<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideEase - Forgot Password</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: #fff;
            width: 360px;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 24px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
            outline: none;
            transition: 0.2s ease;
        }
        input:focus {
            border-color: darkblue;
            box-shadow: 0 0 6px rgba(76,175,80,0.3);
        }
        button {
            width: 100%;
            padding: 12px;
            background: darkblue;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.2s ease-in-out;
        }
        button:hover {
            background: darkblue;
        }
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        a {
            color: darkblue;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
        a:hover {
            text-decoration: underline;
        }
        #message {
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
            min-height: 20px;
        }
        .success {
            color: green;
        }
        .error {
            color: red;
        }
        .info {
            color: darkblue;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Forgot Password</h2>
        <p>Enter your email address and we'll send you a link to reset your password.</p>
        
        <form id="forgotForm" autocomplete="off">
            <input type="email" id="email" placeholder="Enter your email" required autocomplete="off">
            <button type="submit" id="submitBtn">Send Reset Link</button>
        </form>

        <p id="message"></p>

        <p><a href="login.html">Back to Login</a></p>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('email').value = '';
        
        setTimeout(() => {
            document.getElementById('email').value = '';
        }, 100);
    });

    const form = document.getElementById('forgotForm');
    const message = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');
    
    const API_URL = window.location.hostname === 'localhost' 
        ? 'http://localhost:5000' 
        : window.location.origin;

    // Email validation function
    function isValidEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();

        // Validate email
        if (!isValidEmail(email)) {
            message.innerText = 'Please enter a valid email address';
            message.className = 'error';
            return;
        }

        // Disable button and show loading state
        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';
        message.innerText = '';
        message.className = '';

        try {
            const res = await fetch(`${API_URL}/api/auth/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await res.json();
            
            if (res.status === 200) {
                message.innerText = data.message || 'Reset link sent! Check your email.';
                message.className = 'success';
                
                // Clear the form on success
                document.getElementById('email').value = '';
            } else {
                message.innerText = data.message || 'Error sending reset link';
                message.className = 'error';
            }

        } catch (err) {
            message.innerText = 'Server error! Please try again.';
            message.className = 'error';
            console.error('Forgot password error:', err);
        } finally {
            // Re-enable button
            submitBtn.disabled = false;
            submitBtn.textContent = 'Send Reset Link';
        }
    });
</script>
</body>
</html>
